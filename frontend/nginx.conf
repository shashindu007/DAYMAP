server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router owns the routes (/today, /focus, ...). Without this fallback
    # a hard refresh on any non-root path would 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed CRA assets are immutable; index.html must never be cached or
    # clients keep loading a stale bundle after a deploy.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
